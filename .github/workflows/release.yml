name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Build CLI (ARM64)
        run: |
          cd rust-cli
          cargo build --release --target aarch64-apple-darwin --bin codebase-context-graph

      - name: Build GUI (ARM64)
        run: |
          cd rust-cli
          cargo build --release --target aarch64-apple-darwin --bin codebase-context-graph-gui

      - name: Create universal CLI binary
        run: |
          cd rust-cli
          cargo build --release --target x86_64-apple-darwin --bin codebase-context-graph
          lipo -create \
            target/aarch64-apple-darwin/release/codebase-context-graph \
            target/x86_64-apple-darwin/release/codebase-context-graph \
            -output ../codebase-context-graph

      - name: Create macOS app bundle
        run: |
          mkdir -p "Codebase Context Graph.app/Contents/MacOS"
          mkdir -p "Codebase Context Graph.app/Contents/Resources"
          
          cp codebase-context-graph "Codebase Context Graph.app/Contents/MacOS/"
          cp rust-cli/target/aarch64-apple-darwin/release/codebase-context-graph-gui "Codebase Context Graph.app/Contents/MacOS/"
          
          cat > "Codebase Context Graph.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>codebase-context-graph-gui</string>
            <key>CFBundleIdentifier</key>
            <string>com.codebase-context-graph.app</string>
            <key>CFBundleName</key>
            <string>Codebase Context Graph</string>
            <key>CFBundleDisplayName</key>
            <string>Codebase Context Graph</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Create release package
        run: |
          mkdir -p release
          
          cp codebase-context-graph release/
          cp -R "Codebase Context Graph.app" release/
          
          cat > release/README.md << 'EOF'
          # Codebase Context Graph
          
          A native tool that scans local codebases and builds a queryable code graph for AI coding agents.
          
          ## Quick Start
          
          ### Option 1: Desktop App (Recommended)
          
          Double-click **Codebase Context Graph.app** to launch the GUI.
          
          ### Option 2: Command Line
          
          ```bash
          # Initialize a project
          ./codebase-context-graph init --project-root /path/to/project
          
          # Build the code graph
          ./codebase-context-graph index --project-root /path/to/project
          
          # Start MCP server for AI agents
          ./codebase-context-graph serve --project-root /path/to/project
          ```
          
          ## Commands
          
          | Command | Description |
          |---------|-------------|
          | `init` | Create `.codebase-context/config.json` |
          | `index` | Build the code graph |
          | `serve` | Start MCP stdio server |
          | `watch` | Reindex on file changes |
          | `smoke` | Quick validation test |
          
          ## MCP Integration
          
          Add to your Claude Code or IDE MCP configuration:
          
          ```json
          {
            "mcpServers": {
              "codebase-context": {
                "command": "/absolute/path/to/codebase-context-graph",
                "args": ["serve", "--project-root", "/path/to/project"]
              }
            }
          }
          ```
          
          ## License
          
          MIT
          EOF
          
          tar -czvf codebase-context-graph-macos.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebase-context-graph-macos
          path: codebase-context-graph-macos.tar.gz

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: codebase-context-graph-macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: codebase-context-graph-macos.tar.gz
          generate_release_notes: true
          body: |
            ## Codebase Context Graph
            
            A native macOS app for building queryable code graphs for AI coding agents.
            
            ### Download
            
            Download `codebase-context-graph-macos.tar.gz` and extract.
            
            ### Options
            
            1. **Desktop App** - Double-click `Codebase Context Graph.app`
            2. **CLI** - Use `./codebase-context-graph` from Terminal
            
            ### Quick Start CLI
            ```bash
            ./codebase-context-graph init --project-root /path/to/project
            ./codebase-context-graph index --project-root /path/to/project
            ./codebase-context-graph serve --project-root /path/to/project
            ```